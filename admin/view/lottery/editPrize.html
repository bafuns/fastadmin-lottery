    <script>
        $(function() {
            $('#prizeForm').on('submit', function(e) {
                e.preventDefault();
                $.ajax({
                    url: '',
                    type: 'POST',
                    data: $(this).serialize(),
                    success: function(res) {
                        if (res.code === 1) {
                            parent.layer.msg(res.msg);
                            parent.location.reload();
                        } else {
                            layer.msg(res.msg);
                        }
                    }
                });
            });
        });
    </script>
